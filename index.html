<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mesity</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1017;
      --card: #161b25;
      --card-hover: #1c2230;
      --border: #232a38;
      --accent: #34e8a5;
      --accent-dim: rgba(52,232,165,0.15);
      --text: #e8eaf0;
      --text-dim: #8a8fa8;
      --blue: #5b8af5;
      --yellow: #f5c842;
      --purple: #a578f5;
      --orange: #f5924a;
      --red: #f55a5a;
      --green: #34e8a5;
      --gold: #d4a742;
      --gold-dim: rgba(212,167,66,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 84px;
    }
    h1,h2,h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }

    /* === HEADER === */
    .header { padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; background: var(--bg); }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text-dim); font-size: 13px; font-family: 'DM Sans'; font-weight: 400; margin-left: 8px; }
    .menu-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-dim); }

    /* === STATS — 3 cards === */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 12px; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 12px 10px; text-align: center; border: 1px solid var(--border); }
    .stat-num { font-size: 22px; font-weight: 700; font-family: 'DM Sans'; }
    .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

    /* === TABS — 3 tabs === */
    .tabs { display: flex; gap: 0; padding: 0 16px; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--bg); position: sticky; top: 72px; z-index: 99; }
    .tab { flex-shrink: 0; padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* === SEARCH === */
    .search-bar { padding: 12px 16px; }
    .search-bar input { width: 100%; padding: 10px 14px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-family: 'DM Sans'; outline: none; }
    .search-bar input::placeholder { color: var(--text-dim); }
    .search-bar input:focus { border-color: var(--accent); }

    /* === FILTER CHIPS === */
    .filters { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .chip { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; font-size: 12px; background: var(--card); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* === CONTENT === */
    .content { padding: 0 16px; }

    /* === LIST ITEMS === */
    .list-item { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .list-item:active { background: var(--card-hover); }
    .li-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
    .li-code { font-family: monospace; font-size: 11px; color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; }
    .li-title { font-size: 14px; font-weight: 500; margin-top: 4px; line-height: 1.4; }
    .li-meta { font-size: 12px; color: var(--text-dim); margin-top: 5px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* === BADGES === */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
    .badge-green  { background: rgba(52,232,165,0.15); color: var(--green); }
    .badge-yellow { background: rgba(245,200,66,0.15);  color: var(--yellow); }
    .badge-red    { background: rgba(245,90,90,0.15);   color: var(--red); }
    .badge-blue   { background: rgba(91,138,245,0.15);  color: var(--blue); }
    .badge-purple { background: rgba(165,120,245,0.15); color: var(--purple); }
    .badge-orange { background: rgba(245,146,74,0.15);  color: var(--orange); }
    .badge-gold   { background: var(--gold-dim); color: var(--gold); }

    /* === STAR SYSTEM === */
    .stars { display: inline-flex; gap: 1px; align-items: center; line-height: 1; }
    .star-lit   { color: var(--gold);  text-shadow: 0 0 4px rgba(212,167,66,0.4); font-weight: bold; font-size: 14px; }
    .star-unlit { color: #3a3a48; font-size: 14px; }
    .star-red   { color: var(--red);   font-weight: bold; font-size: 14px; }
    .star-green { color: var(--green); font-weight: bold; font-size: 14px; }

    /* === AREA CHIPS === */
    .area-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .area-chip { padding: 2px 9px; border-radius: 10px; font-size: 11px; background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); color: var(--yellow); }

    /* === FOLLOW-UP CARDS === */
    .fu-card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
    .fu-card.urgent   { border-left: 3px solid var(--red); }
    .fu-card.today    { border-left: 3px solid var(--orange); }
    .fu-card.tomorrow { border-left: 3px solid var(--yellow); }
    .fu-card.future   { border-left: 3px solid var(--green); }
    .fu-header { display: flex; justify-content: space-between; align-items: center; }
    .complete-btn { padding: 6px 14px; border-radius: 8px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(52,232,165,0.3); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans'; }
    .complete-btn:active { background: var(--accent); color: var(--bg); }

    /* === DRAWER === */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: -100%; bottom: 0; width: 94%; max-width: 440px; background: var(--bg); z-index: 201; transition: right 0.3s ease; overflow-y: auto; padding: 20px 16px 120px; }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .drawer-close { width: 32px; height: 32px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text-dim); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .back-btn { color: var(--accent); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

    /* === DETAIL SECTIONS === */
    .detail-section { margin-bottom: 18px; }
    .detail-section-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
    .detail-header-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; line-height: 1.3; }
    .detail-header-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .detail-header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

    /* === CONTACT / OWNER CARDS === */
    .owner-card   { background: var(--card); border-radius: 12px; border: 1px solid var(--border); border-left: 3px solid var(--orange); padding: 12px 14px; }
    .contact-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); border-left: 3px solid var(--green);  padding: 12px 14px; }
    .notes-card   { background: var(--card); border-radius: 12px; border: 1px solid var(--border); border-left: 3px solid var(--yellow); padding: 12px 14px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .action-row { display: flex; gap: 6px; margin-top: 10px; }
    .contact-btn { flex: 1; padding: 8px 4px; border-radius: 10px; font-size: 12px; font-weight: 600; text-align: center; border: 1px solid var(--border); background: var(--card-hover); color: var(--text); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 3px; }
    .contact-btn.phone    { color: var(--accent);  border-color: rgba(52,232,165,0.3); }
    .contact-btn.whatsapp { color: #25D366;        border-color: rgba(37,211,102,0.3); }
    .contact-btn.viber    { color: var(--purple);  border-color: rgba(165,120,245,0.3); }

    /* === CHARACTERISTICS GRID === */
    .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .char-item { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 10px 8px; text-align: center; }
    .char-value { font-size: 15px; font-weight: 600; color: var(--text); }
    .char-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* === ACTION BUTTONS (CMA + Spitogatos) === */
    .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn { padding: 11px 8px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid transparent; }
    .action-btn.cma        { background: rgba(165,120,245,0.2); border-color: rgba(165,120,245,0.45); color: var(--purple); }
    .action-btn.spitogatos { background: rgba(91,138,245,0.15); border-color: rgba(91,138,245,0.35); color: var(--blue); }
    .action-btn.disabled   { background: var(--card); border-color: var(--border); color: var(--text-dim); cursor: default; opacity: 0.5; }

    /* === COLLAPSIBLE === */
    .collapsible-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px 14px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); }
    .collapsible-body { display: none; padding: 8px 0 0; }
    .collapsible-body.open { display: block; }
    .comp-item { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }

    /* === PROPOSALS === */
    .proposals-heading { font-size: 12px; font-weight: 700; letter-spacing: 0.4px; padding: 8px 0 6px; display: flex; justify-content: space-between; align-items: center; }
    .proposal-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
    .proposal-card:active { background: var(--card-hover); }
    .proposal-title { font-size: 13px; font-weight: 500; }
    .proposal-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; }
    .placeholder-section { font-size: 12px; color: var(--text-dim); padding: 10px 12px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); line-height: 1.5; }

    /* === TIMELINE === */
    .timeline { padding: 2px 0; }
    .timeline-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .timeline-item:last-child { border-bottom: none; }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; margin-top: 5px; }
    .tl-dot.voice   { background: var(--accent); }
    .tl-dot.text    { background: var(--blue); }
    .tl-dot.viewing { background: var(--purple); }
    .tl-content { flex: 1; min-width: 0; }
    .tl-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 8px; margin-bottom: 2px; }
    .tl-text { font-size: 12px; line-height: 1.4; color: var(--text); word-break: break-word; }

    /* === DIFFICULTY === */
    .diff-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .diff-row:last-child { border-bottom: none; }

    /* === VIEWING BUTTON === */
    .viewing-btn { width: 100%; padding: 12px; border-radius: 10px; background: rgba(165,120,245,0.13); border: 1px solid rgba(165,120,245,0.35); color: var(--purple); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans'; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .viewing-btn:active { background: rgba(165,120,245,0.25); }

    /* === GLOBAL VOICE BAR (fixed bottom) === */
    .voice-bar-global { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 8px 14px 10px; z-index: 100; }
    .voice-bar-row { display: flex; align-items: center; gap: 8px; }
    .voice-bar-hint { font-size: 10px; color: var(--text-dim); text-align: center; padding: 3px 0 0; }
    .voice-bar-hint span { color: var(--accent); }

    /* === CONTEXTUAL VOICE BAR (sticky in drawer) === */
    .voice-bar-sticky { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 8px 16px 10px; margin: 0 -16px; display: flex; align-items: center; gap: 8px; }

    /* === SHARED VOICE ELEMENTS === */
    .voice-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: transform 0.15s; }
    .voice-btn:active { transform: scale(0.92); }
    .voice-btn.recording { background: var(--red); animation: pulse-rec 1s infinite; }
    @keyframes pulse-rec { 0%,100%{box-shadow:0 0 0 0 rgba(245,90,90,0.4);}50%{box-shadow:0 0 0 8px rgba(245,90,90,0);} }
    .voice-input { flex: 1; padding: 10px 12px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-family: 'DM Sans'; outline: none; min-width: 0; }
    .voice-input::placeholder { color: var(--text-dim); }
    .voice-input:focus { border-color: var(--accent); }
    .voice-send-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--accent-dim); border: 1px solid rgba(52,232,165,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; color: var(--accent); font-weight: 600; }

    /* === CHEVRON === */
    .chevron { transition: transform 0.2s; display: inline-block; font-size: 13px; color: var(--text-dim); }
    .chevron.open { transform: rotate(180deg); }

    /* === LEGACY CONTACT DETAIL === */
    .cd-name { font-family: 'Cormorant Garamond'; font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .cd-info { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
    .cd-row { display: flex; gap: 8px; font-size: 13px; color: var(--text-dim); align-items: center; }
    .cd-row a { color: var(--accent); text-decoration: none; }
    .cd-section { margin-top: 16px; }
    .cd-section-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    /* === MENU === */
    .menu-popup { position: fixed; top: 56px; right: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 6px 0; z-index: 150; min-width: 200px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none; }
    .menu-popup.show { display: block; }
    .menu-item { padding: 10px 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text); }
    .menu-item:active { background: var(--card-hover); }
    .menu-item .mi-icon { font-size: 16px; width: 24px; text-align: center; }

    /* === MISC === */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; line-height: 1.5; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 30px; color: var(--text-dim); font-size: 13px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-left: 4px; vertical-align: middle; }
    .sync-dot.synced { background: var(--green); }
    .sync-dot.unsynced { background: var(--text-dim); }
  .sort-dropdown { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; margin-left: auto; }
  .spitogatos-btn { background: var(--purple); border-radius: 10px; padding: 10px 16px; font-size: 14px; color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .prop-mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; margin-top: 8px; }
  .pmc-addr { font-weight: 600; font-size: 14px; color: var(--text); }
  .pmc-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer"></div>

  <div class="menu-popup" id="menu-popup">
    <div class="menu-item" onclick="openContacts()"><span class="mi-icon">👤</span> Επαφές (<span id="menu-contact-count">0</span>)</div>
    <div class="menu-item" onclick="triggerSync()"><span class="mi-icon">🔄</span> iList Sync</div>
    <div class="menu-item" onclick="reloadAll()"><span class="mi-icon">↻</span> Ανανέωση</div>
  </div>

  <!-- Global voice bar — fixed bottom, visible on all list views -->
  <div class="voice-bar-global" id="global-voice-bar">
    <div class="voice-bar-row">
      <button class="voice-btn" id="vbtn-global" onclick="toggleRecording('global')">🎤</button>
      <input class="voice-input" id="vinput-global"
        placeholder="Πες ή γράψε κάτι..."
        onkeydown="if(event.key==='Enter')sendText('global')">
      <div class="voice-send-btn" onclick="sendText('global')">→</div>
    </div>
    <div class="voice-bar-hint">Ηχητική εντολή ή κείμενο · <span>'Νέα ζήτηση Γλυφάδα 300χιλ'</span></div>
  </div>

  <script>
    // ===== CONFIG =====
    const SB  = 'https://gdirlkqsusgaeryfldmd.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkaXJsa3FzdXNnYWVyeWZsZG1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzOTQ4ODIsImV4cCI6MjA4Njk3MDg4Mn0.94sLCjdNBk1b2XFVwN9byv756qSZydt5ihE16VmY8Yw';
    const N8N_SYNC  = 'https://thanos.app.n8n.cloud/webhook/mesity-ilist-sync';
    const N8N_VOICE = 'https://thanos.app.n8n.cloud/webhook/voice-intelligence';
    const N8N_TEXT  = 'https://thanos.app.n8n.cloud/webhook/mesity-text-input';
    const MY_AGENT_ID = '117241';

    // ===== TELEGRAM =====
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== STATE =====
    let state = {
      tab: 'properties',
    propertiesSort: 'date_desc',
    requirementsSort: 'date_desc',
      search: '',
      filter: 'all',
      contacts: [],
      properties: [],
      requirements: [],
      followUps: [],
      activities: [],
      viewings: [],
      loaded: false,
      menuOpen: false,
      drawerMode: null,
      selectedContact: null,
      selectedProperty: null,
      selectedPropertyEnrichment: null,
      selectedRequirement: null,
      myPropertiesOnly: false,
      competitionData: {},     // keyed by property_id → array of re_property_competition rows
      requirementMatches: {},  // keyed by requirement_id → { portfolio:[], privateAds:[], market:[] }
    };

    // ===== VOICE STATE =====
    let recorder = null;
    let audioChunks = [];
    let recordingCtx = null;

    // ===== SUPABASE =====
    async function sbGet(table, params='') {
      const res = await fetch(`${SB}/rest/v1/${table}?${params}`, {
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
      });
      if (!res.ok) throw new Error(`${table}: ${res.status}`);
      return res.json();
    }
    async function sbPatch(table, id, body) {
      const res = await fetch(`${SB}/rest/v1/${table}?id=eq.${id}`, {
        method: 'PATCH',

    async function loadAll() {
      state.loaded = false; render();
      try {
        const [contacts, properties, requirements, followUps, activities, viewings, reqMatches, compData] = await Promise.all([
          sbGet('re_contacts',              'select=*&order=full_name.asc'),
          sbGet('re_properties',            'select=*&order=created_at.desc&limit=500'),
          sbGet('re_client_requirements',   'select=*&order=created_at.desc'),
          sbGet('re_follow_ups',            'select=*&status=neq.completed&order=due_date.asc,due_time.asc'),
          sbGet('contact_activities',       'select=*&order=created_at.desc&limit=200'),
          sbGet('re_property_viewings',     'select=*&order=viewing_date.desc'),
          sbGet('re_requirement_matches',   'select=*&order=match_score.desc.nullslast').catch(()=>[]),
          sbGet('re_property_competition',  'select=*').catch(()=>[]),
        ]);
        state.contacts=contacts; state.properties=properties; state.requirements=requirements;
        state.followUps=followUps; state.activities=activities; state.viewings=viewings;
        // Index competition data by property_id
        state.competitionData = {};
        for (const row of (compData||[])) {
          const key = String(row.property_id);
          if (!state.competitionData[key]) state.competitionData[key] = [];
          state.competitionData[key].push(row);
        }
        // Index requirement matches by requirement_id, split by source_db
        state.requirementMatches = {};
        for (const row of (reqMatches||[])) {
          const key = String(row.requirement_id);
          if (!state.requirementMatches[key]) state.requirementMatches[key] = { portfolio:[], privateAds:[], market:[] };
          if (row.source_db === 'optimus' || row.source === 'portfolio') state.requirementMatches[key].portfolio.push(row);
          else if (row.source_db === 'private_ads' || row.source === 'private_ad') state.requirementMatches[key].privateAds.push(row);
          else state.requirementMatches[key].market.push(row);
        }
        state.loaded = true;
        document.getElementById('menu-contact-count').textContent = contacts.length;
      } catch(e) { console.error(e); state.loaded = true; }
      render();
    }

    function sortProperties(items,sortKey){
      const arr=[...items];
      if(sortKey==='price_asc')  return arr.sort((a,b)=>Number(a.price||0)-Number(b.price||0));
      if(sortKey==='price_desc') return arr.sort((a,b)=>Number(b.price||0)-Number(a.price||0));
      if(sortKey==='sqm_asc')    return arr.sort((a,b)=>Number(a.sqm||0)-Number(b.sqm||0));
      if(sortKey==='sqm_desc')   return arr.sort((a,b)=>Number(b.sqm||0)-Number(a.sqm||0));
      if(sortKey==='date_desc')  return arr.sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
      if(sortKey==='date_asc')   return arr.sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
      // legacy compat
      if(sortKey==='desc') return arr.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
      if(sortKey==='asc')  return arr.sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
      return arr;
    }
    function sortRequirements(items,sortKey){
      const arr=[...items];
      if(sortKey==='budget_asc')  return arr.sort((a,b)=>Number(a.budget_max||a.budget_min||0)-Number(b.budget_max||b.budget_min||0));
      if(sortKey==='budget_desc') return arr.sort((a,b)=>Number(b.budget_max||b.budget_min||0)-Number(a.budget_max||a.budget_min||0));
      if(sortKey==='date_desc')   return arr.sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
      if(sortKey==='date_asc')    return arr.sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
      if(sortKey==='area')        return arr.sort((a,b)=>{const aA=Array.isArray(a.preferred_areas)?a.preferred_areas.join(','):(a.preferred_areas||'');const bA=Array.isArray(b.preferred_areas)?b.preferred_areas.join(','):(b.preferred_areas||'');return aA.localeCompare(bA,'el');});
      // legacy compat
      if(sortKey==='desc') return arr.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
      if(sortKey==='asc')  return arr.sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
      return arr;
    }

    function portfolioMatch(req) {
      const areas=Array.isArray(req.preferred_areas)?req.preferred_areas:(req.preferred_areas?String(req.preferred_areas).split(',').map(s=>s.trim()).filter(Boolean):[]);
      return state.properties.filter(p=>{
        if(['Πωλημένο','sold','Ενοικιασμένο','rented','removed_from_ilist','removed'].includes(p.status))return false;
        if(areas.length&&p.area&&!areas.some(a=>p.area.includes(a)||a.includes(p.area)))return false;
        if(req.budget_max&&p.price&&Number(p.price)>Number(req.budget_max)*1.12)return false;
        if(req.bedrooms_min&&p.bedrooms&&Number(p.bedrooms)<Number(req.bedrooms_min))return false;
        if(req.sqm_min&&p.sqm&&Number(p.sqm)<Number(req.sqm_min)*0.88)return false;
        return true;
      });
    }

    // ===== VOICE =====
    async function toggleRecording(ctx,propId,contId,reqId){
      if(recorder&&recorder.state==='recording'){stopRecording();return;}
      recordingCtx={type:ctx,property_id:propId||null,contact_id:contId||null,requirement_id:reqId||null};
      await startRecording(ctx);
    }
    async function startRecording(ctx){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        audioChunks=[];
        const mime=MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')?'audio/ogg;codecs=opus':MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
        recorder=new MediaRecorder(stream,{mimeType:mime});
        recorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
        recorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());sendVoice(new Blob(audioChunks,{type:mime}));};
        recorder.start();
        const btn=document.getElementById(`vbtn-${ctx}`);
        if(btn){btn.textContent='⏹';btn.classList.add('recording');}
        haptic('medium');
      }catch(e){toast('Μικρόφωνο: '+e.message);}
    }
    function stopRecording(){
      if(recorder&&recorder.state==='recording'){
        recorder.stop();
        const btn=document.getElementById(`vbtn-${recordingCtx?.type}`);
        if(btn){btn.textContent='🎤';btn.classList.remove('recording');}
      }
    }
    async function sendVoice(blob){
      try{
        toast('Αποστολή ηχητικού...');
        const uid=String(tg?.initDataUnsafe?.user?.id||'6375174442');
        const ctx=recordingCtx||{};
        // Convert blob → base64
        const buf=await blob.arrayBuffer();
        const bytes=new Uint8Array(buf);
        let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
        const audio_base64=btoa(bin);
        const audio_format=blob.type.includes('ogg')?'ogg':'webm';
        // Entity title for context hint
        let entity_title=null;
        if(ctx.type==='property'&&state.selectedProperty) entity_title=propTitle(state.selectedProperty);
        else if(ctx.type==='requirement'&&state.selectedRequirement) entity_title=contactName(state.selectedRequirement.contact_id);
        const r=await fetch(N8N_VOICE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          input_type:'voice',audio_base64,audio_format,
          context:ctx.type||'global',chat_id:uid,
          property_id:ctx.property_id||null,requirement_id:ctx.requirement_id||null,
          contact_id:ctx.contact_id||null,entity_title
        })});
        toast(r.ok?'Καταγράφηκε ✓':'Σφάλμα αποστολής');
        if(r.ok)haptic('success');
      }catch(e){toast('Σφάλμα: '+e.message);}
    }
    async function sendText(ctx){
      const inp=document.getElementById(`vinput-${ctx}`);if(!inp)return;
      const text=inp.value.trim();if(!text)return;inp.value='';
      try{
        toast('Αποστολή...');
        const uid=String(tg?.initDataUnsafe?.user?.id||'6375174442');
        const rc=recordingCtx||{type:ctx};
        // Entity title for context hint

        if(rc.type==='property'&&state.selectedProperty) entity_title=propTitle(state.selectedProperty);

        })});

      }catch(e){toast('Σφάλμα: '+e.message);}
    }

    // ===== MAIN RENDER =====
    function render(){
      const app=document.getElementById('app');
      const visProps=state.properties.filter(p=>!['removed_from_ilist','removed'].includes(p.status));
      const stats=[
        {num:visProps.length,        label:'Ακίνητα',   color:'var(--blue)'},
        {num:state.requirements.length, label:'Ζητήσεις',  color:'var(--yellow)'},
        {num:state.followUps.length,    label:'Next Steps', color:'var(--orange)'},
      ];
      let html=`
      <div class="header"><div class="header-top"><div class="logo">Mesity <span>CRM</span></div><div class="menu-btn" onclick="toggleMenu()">⋯</div></div></div>
      <div class="stats">${stats.map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.color}">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('')}</div>
      <div class="tabs">
        <div class="tab ${state.tab==='properties'  ?'active':''}" onclick="switchTab('properties')">🏠 Ακίνητα</div>
        <div class="tab ${state.tab==='requirements'?'active':''}" onclick="switchTab('requirements')">📋 Ζητήσεις</div>
        <div class="tab ${state.tab==='followups'   ?'active':''}" onclick="switchTab('followups')">⚡ Next Steps</div>
      </div>`;
      if(!state.loaded){html+='<div class="loading"><span class="spinner"></span> Φόρτωση δεδομένων...</div>';app.innerHTML=html;return;}
      if(state.tab==='properties')    html+=renderPropsTab();
      else if(state.tab==='requirements') html+=renderReqsTab();
      else if(state.tab==='followups')    html+=renderFUTab();
      app.innerHTML=html;
    }
    function switchTab(t){state.tab=t;state.search='';state.filter='all';render();haptic('light');}

    // ===== PROPERTIES TAB =====
    function renderPropsTab(){
      let items=state.properties.filter(p=>!['removed_from_ilist','removed'].includes(p.status));
      if(state.filter==='mine')items=items.filter(p=>String(p.agent_ilist_id)===MY_AGENT_ID);
      else if(state.filter==='Διαθέσιμο')items=items.filter(p=>['Διαθέσιμο','available'].includes(p.status));
      else if(state.filter==='Κρατημένο')items=items.filter(p=>['Κρατημένο','reserved'].includes(p.status));
      const q=state.search.toLowerCase();
      if(q)items=items.filter(p=>String(p.ilist_id||'').includes(q)||(p.area||'').toLowerCase().includes(q)||(p.property_type||'').toLowerCase().includes(q)||(p.title||'').toLowerCase().includes(q));
      return`
      <div class="search-bar"><input placeholder="Αναζήτηση κωδικού, περιοχής, τύπου..." value="${state.search}" oninput="state.search=this.value;render()"></div>
      <div class="filters">
        ${[{k:'all',l:'Όλα'},{k:'mine',l:'👤 Τα δικά μου'},{k:'Διαθέσιμο',l:'Διαθέσιμο'},{k:'Κρατημένο',l:'Κρατημένο'}].map(c=>`<div class="chip ${state.filter===c.k?'active':''}" onclick="state.filter='${c.k}';render()">${c.l}</div>`).join('')}
      <select class="sort-dropdown" onchange="updateSort('properties',this.value)">${[{v:'date_desc',l:'Πρόσφατα ↓'},{v:'date_asc',l:'Παλαιότερα ↑'},{v:'price_asc',l:'Τιμή ↑'},{v:'price_desc',l:'Τιμή ↓'},{v:'sqm_asc',l:'Εμβαδόν ↑'},{v:'sqm_desc',l:'Εμβαδόν ↓'}].map(o=>`<option value="${o.v}"${state.propertiesSort===o.v?' selected':''}>${o.l}</option>`).join('')}</select>
      </div>
      <div class="content">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${items.length} ακίνητα</div>
        ${sortProperties(items,state.propertiesSort).slice(0,100).map(p=>{
          const isMine=String(p.agent_ilist_id)===MY_AGENT_ID; const vcnt=viewingsForProp(p.id).length;
          return`<div class="list-item" onclick="openPropertyDetail('${p.id}')">
            <div class="li-top">${p.ilist_id?`<span class="li-code">#${p.ilist_id}</span>`:'<span></span>'}<div>${renderStars(p.competitiveness_score||0)}</div></div>
            <div class="li-title">${propTitle(p)}</div>
            <div class="li-meta">${statusBadge(p.listing_type||p.status)} ${p.price?`<span style="font-weight:600;color:var(--text)">€${Number(p.price).toLocaleString('el-GR')}</span>`:''} ${p.bedrooms?`<span>${p.bedrooms}υ/δ</span>`:''} ${p.floor?`<span>${p.floor}ος</span>`:''}</div>
            <div class="li-meta">${isMine?`<span>👤 ${p.agent_name||'Εγώ'}</span>`:(p.agent_name?`<span>👤 ${p.agent_name}</span>`:'')} ${vcnt>0?`<span style="color:var(--purple)">🏠 ${vcnt} υποδείξεις</span>`:''}</div>
          </div>`;}).join('')}
        ${items.length>100?`<div style="text-align:center;color:var(--text-dim);padding:16px;font-size:12px">+${items.length-100} ακόμα...</div>`:''}
        ${items.length===0?'<div class="empty-state"><div class="empty-icon">🏠</div><div class="empty-text">Δεν βρέθηκαν ακίνητα</div></div>':''}
      </div>`;
    }

    // ===== REQUIREMENTS TAB =====
    function renderReqsTab(){
      let items=state.requirements;
      const q=state.search.toLowerCase();
      if(q)items=items.filter(r=>contactName(r.contact_id).toLowerCase().includes(q)||(r.preferred_areas||'').toString().toLowerCase().includes(q));
      return`
      <div class="search-bar"><input placeholder="Αναζήτηση πελάτη, περιοχής..." value="${state.search}" oninput="state.search=this.value;render()"></div>
      <select class="sort-dropdown" onchange="updateSort('requirements',this.value)">${[{v:'date_desc',l:'Πρόσφατα ↓'},{v:'date_asc',l:'Παλαιότερα ↑'},{v:'budget_asc',l:'Budget ↑'},{v:'budget_desc',l:'Budget ↓'},{v:'area',l:'Περιοχή A→Z'}].map(o=>`<option value="${o.v}"${state.requirementsSort===o.v?' selected':''}>${o.l}</option>`).join('')}</select>
      <div class="content">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${items.length} ζητήσεις</div>
        ${sortRequirements(items,state.requirementsSort).map(r=>{
          const areas=Array.isArray(r.preferred_areas)?r.preferred_areas:(r.preferred_areas?String(r.preferred_areas).split(',').map(s=>s.trim()).filter(Boolean):[]);
          const ds=r.difficulty_score||0; const isBuy=(r.requirement_type||'').toLowerCase().includes('αγορά')||(r.requirement_type||'').toLowerCase().includes('buy');
          return`<div class="list-item" onclick="openRequirementDetail('${r.id}')">
            <div class="li-top"><span class="badge ${isBuy?'badge-blue':'badge-green'}">${r.requirement_type||'Αγορά'}</span><div>${renderStars(ds,5,diffStarCls)}</div></div>
            <div class="li-title">${contactName(r.contact_id)}</div>
            <div class="li-meta">${r.budget_min||r.budget_max?`<span>💰 €${(r.budget_min||0).toLocaleString('el-GR')}–${(r.budget_max||0).toLocaleString('el-GR')}</span>`:''} ${r.sqm_min?`<span>📐 ${r.sqm_min}${r.sqm_max?'–'+r.sqm_max:''}τμ</span>`:''} ${r.bedrooms_min?`<span>🛏 ${r.bedrooms_min}+ υ/δ</span>`:''}</div>
            ${areas.length?`<div class="area-chips">${areas.slice(0,5).map(a=>`<span class="area-chip">${a}</span>`).join('')}${areas.length>5?`<span class="area-chip">+${areas.length-5}</span>`:''}</div>`:''}
          </div>`;}).join('')}
        ${items.length===0?'<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Δεν βρέθηκαν ζητήσεις</div></div>':''}
      </div>`;
    }

    // ===== NEXT STEPS TAB =====
    function renderFUTab(){
      if(!state.followUps.length)return`<div class="content"><div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-text">Κανένα εκκρεμές follow-up<br><span style="font-size:12px;color:var(--text-dim)">Δημιουργήστε μέσω voice/text commands</span></div></div></div>`;
      return`<div class="content">${state.followUps.map(f=>{const urg=fuUrgency(f.due_date);const urgL={urgent:'Εκπρόθεσμο',today:'Σήμερα',tomorrow:'Αύριο',future:f.due_date||''};return`<div class="fu-card ${urg}"><div class="fu-header"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${fuIcon(f.follow_up_type)}</span><div><div style="font-size:14px;font-weight:500">${f.title||f.follow_up_type||'Follow-up'}</div><div class="li-meta">${urgL[urg]||f.due_date} ${f.due_time?'· '+f.due_time:''}</div></div></div><button class="complete-btn" onclick="event.stopPropagation();completeFollowUp('${f.id}')">✓ Ολοκλήρωση</button></div>${f.notes?`<div style="font-size:12px;color:var(--text-dim);margin-top:8px">${f.notes}</div>`:''}<div class="li-meta" style="margin-top:6px">${f.contact_id?`<span>👤 ${contactName(f.contact_id)}</span>`:''}</div></div>`;}).join('')}</div>`;
    }

    // ===== CLOSE MENU ON OUTSIDE CLICK =====
    document.addEventListener('click',e=>{if(state.menuOpen&&!e.target.closest('.menu-popup')&&!e.target.closest('.menu-btn'))closeMenu();});

    // ===== INIT =====
    loadAll();
  </script>
</body>
</html>
